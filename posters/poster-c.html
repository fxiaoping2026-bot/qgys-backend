<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<title>海报C - 深色品质风</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body { width: 750px; height: 1200px; overflow: hidden; font-family: 'PingFang SC', sans-serif; }

  .poster-c {
    width: 750px; height: 1200px;
    background: linear-gradient(170deg, #1a1a2e 0%, #0f3460 40%, #16213e 100%);
    position: relative; display: flex; flex-direction: column; align-items: center;
    padding: 55px 48px 40px;
    overflow: hidden;
  }

  /* 金色光晕装饰 */
  .glow-ring {
    position: absolute; width: 500px; height: 500px;
    border-radius: 50%; top: -80px; right: -100px;
    background: radial-gradient(circle, rgba(212,175,55,0.12) 0%, transparent 70%);
  }
  .glow-ring-2 {
    position: absolute; width: 350px; height: 350px;
    border-radius: 50%; bottom: 80px; left: -80px;
    background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
  }

  /* 顶部金线 */
  .gold-line-top {
    position: absolute; top: 0; left: 0; width: 100%; height: 4px;
    background: linear-gradient(90deg, transparent 0%, #d4af37 30%, #f5e6a3 50%, #d4af37 70%, transparent 100%);
  }
  .gold-line-bottom {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
    background: linear-gradient(90deg, transparent 0%, rgba(212,175,55,0.5) 30%, rgba(245,230,163,0.6) 50%, rgba(212,175,55,0.5) 70%, transparent 100%);
  }

  .brand-area { text-align: center; margin-bottom: 28px; position: relative; z-index: 2; }
  .brand-icon { font-size: 42px; margin-bottom: 6px; filter: brightness(1.2); }
  .brand-name { font-size: 50px; font-weight: 900; color: #d4af37; letter-spacing: 8px; text-shadow: 0 0 30px rgba(212,175,55,0.3); }
  .brand-slogan { font-size: 16px; color: rgba(212,175,55,0.7); margin-top: 10px; letter-spacing: 6px; font-weight: 300; }
  .gold-divider { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, #d4af37, transparent); margin: 14px auto 0; }

  /* 深色内容卡片 */
  .content-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(212,175,55,0.18);
    border-radius: 24px; padding: 36px 32px; width: 100%;
    backdrop-filter: blur(8px);
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 0 60px rgba(212,175,55,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .card-label {
    font-size: 13px; color: rgba(212,175,55,0.6); letter-spacing: 5px;
    text-transform: uppercase; margin-bottom: 8px; font-weight: 300;
  }
  .scan-title { font-size: 36px; font-weight: 900; color: #fff; margin-bottom: 4px; letter-spacing: 3px; }
  .scan-sub { font-size: 16px; color: rgba(212,175,55,0.7); margin-bottom: 26px; }

  .qr-wrap {
    width: 310px; height: 310px; border-radius: 20px;
    background: #fff; padding: 14px;
    border: 2px solid #d4af37;
    box-shadow: 0 0 40px rgba(212,175,55,0.15), 0 8px 30px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px; position: relative;
  }
  .qr-wrap img { width: 100%; height: 100%; object-fit: contain; }

  .scan-steps { display: flex; gap: 20px; margin-bottom: 22px; }
  .scan-step { text-align: center; flex: 1; }
  .scan-step-icon { font-size: 22px; margin-bottom: 4px; }
  .scan-step-label { font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 500; }

  .hot-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.06));
    border: 1px solid rgba(212,175,55,0.2);
    color: #d4af37; font-size: 14px; font-weight: 600;
    padding: 8px 20px; border-radius: 20px; margin-bottom: 18px;
  }

  .food-features { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .food-feature {
    font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500;
    padding: 6px 14px; border-radius: 8px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  }

  .footer-area { margin-top: 28px; text-align: center; position: relative; z-index: 2; }
  .footer-brand { font-size: 18px; color: #d4af37; font-weight: 700; letter-spacing: 3px; }
  .footer-addr { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 6px; letter-spacing: 1px; }
  .save-btn-c {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #d4af37, #f5e6a3, #d4af37);
    color: #1a1a2e; font-size: 18px; font-weight: 800; letter-spacing: 2px;
    border: none; border-radius: 40px; padding: 14px 48px;
    box-shadow: 0 6px 24px rgba(212,175,55,0.5);
    cursor: pointer; z-index: 999; transition: transform 0.15s;
  }
  .save-btn-c:active { transform: translateX(-50%) scale(0.96); }
  .save-tip-c { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.78); color: #fff; font-size: 16px; padding: 14px 32px; border-radius: 12px; z-index: 1000; display: none; }
</style>
</head>
<body>
<div class="poster-c">
  <div class="glow-ring"></div>
  <div class="glow-ring-2"></div>
  <div class="gold-line-top"></div>
  <div class="gold-line-bottom"></div>

  <div class="brand-area">
    <div class="brand-icon">🐚</div>
    <div class="brand-name">企港渔叔</div>
    <div class="brand-slogan">PREMIUM · SEAFOOD · KITCHEN</div>
    <div class="gold-divider"></div>
  </div>

  <div class="content-card">
    <div class="card-label">ORDER ONLINE</div>
    <div class="scan-title">扫码点餐</div>
    <div class="scan-sub">Scan QR Code to Order</div>

    <div class="qr-wrap">
      <img src="qrcode.png" alt="点餐二维码">
    </div>

    <div class="hot-tag">🔥 今日新鲜到港 · 每日限量供应</div>

    <div class="scan-steps">
      <div class="scan-step">
        <div class="scan-step-icon">📱</div>
        <div class="scan-step-label">扫码进入</div>
      </div>
      <div class="scan-step">
        <div class="scan-step-icon">🦐</div>
        <div class="scan-step-label">挑选海鲜</div>
      </div>
      <div class="scan-step">
        <div class="scan-step-icon">✅</div>
        <div class="scan-step-label">一键下单</div>
      </div>
    </div>

    <div class="food-features">
      <span class="food-feature">🦐 鲜活现杀</span>
      <span class="food-feature">🔥 猛火现炒</span>
      <span class="food-feature">⏱️ 极速上桌</span>
      <span class="food-feature">💯 品质保证</span>
    </div>
  </div>

  <div class="footer-area">
    <div class="footer-brand">📍 佛山市禅城区水悦龙湾店</div>
    <div class="footer-addr">营业时间 11:00-14:00 / 17:00-22:00</div>
  </div>
</div>

<button class="save-btn-c" id="saveBtnC" onclick="saveAsImageC()">📥 保存为图片</button>
<div class="save-tip-c" id="saveTipC">正在生成图片，请稍候…</div>

<script>
function saveAsImageC() {
  var tip = document.getElementById('saveTipC');
  tip.style.display = 'block';
  document.getElementById('saveBtnC').style.display = 'none';
  setTimeout(function() {
    html2canvas(document.querySelector('.poster-c'), {
      width: 750, height: 1200, scale: 2,
      backgroundColor: null, useCORS: true, logging: false
    }).then(function(canvas) {
      tip.style.display = 'none';
      var link = document.createElement('a');
      link.download = '企港渔叔-点餐海报-深色品质风.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      document.getElementById('saveBtnC').style.display = 'block';
    }).catch(function() {
      tip.innerText = '❌ 生成失败，请截图保存';
      setTimeout(function(){ tip.style.display='none'; document.getElementById('saveBtnC').style.display='block'; }, 2000);
    });
  }, 100);
}
</script>
</body>
</html>
